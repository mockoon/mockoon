@if (!edit || !editCondition) {
  <span
    [class]="{
      'cursor-text': editCondition && data.enabled
    }"
    >{{ _text ? _text : '&nbsp;' }}</span
  >
}
@if (edit && editCondition) {
  <input
    #input
    type="text"
    class="form-control invisible-input"
    [formControl]="data"
    (click)="$event.stopPropagation()"
    (keydown)="keydown($event)"
    (blur)="save()"
  />
}
