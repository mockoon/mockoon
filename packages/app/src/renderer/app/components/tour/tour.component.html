@let backdropSizes = backdropSizes$ | async;

<ng-template #popover let-data="data" let-total="total" let-current="current">
  <div class="">
    <div class="d-flex mb-2">
      <h5 class="m-0">{{ data.title }}</h5>
      <button
        type="button"
        aria-label="Close"
        class="btn-close ms-auto"
        (click)="close()"
      ></button>
    </div>

    <div [innerHTML]="data.content"></div>
    @for (link of data.links; track link.url) {
      <div class="mt-2">
        <a href="{{ link.url }}" target="_blank">{{
          link.text ? link.text : 'Learn more'
        }}</a>
      </div>
    }

    <div class="d-flex align-items-center justify-content-between mt-4">
      <button
        class="btn btn-sm btn-secondary"
        [disabled]="current === 1"
        (click)="previous()"
      >
        <app-svg icon="chevron_left" />
        Prev
      </button>
      <div class="">{{ current }} / {{ total }}</div>
      @if (current < total) {
        <button class="btn btn-sm btn-primary" (click)="next()">
          Next
          <app-svg icon="chevron_right" />
        </button>
      }
      @if (current === total) {
        <button class="btn btn-sm btn-primary" (click)="close()">End</button>
      }
    </div>
  </div>
</ng-template>

@for (backdropSize of backdropSizes; track $index) {
  <div
    class="tour-backdrop"
    [style]="{
      width: backdropSize.width + 'px',
      height: backdropSize.height + 'px',
      top: backdropSize.top + 'px',
      left: backdropSize.left + 'px'
    }"
  ></div>
}
