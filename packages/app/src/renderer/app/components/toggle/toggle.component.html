<div class="btn-group btn-group-sm h-100" data-bs-toggle="buttons" role="group">
  <button *ngIf="label" class="btn btn-custom px-3" disabled>
    {{ label }}
  </button>

  <ng-container *ngFor="let item of items">
    <!-- Single toggle mode (checkbox, boolean) -->
    <ng-container *ngIf="items.length === 1">
      @let idLabel = (item.label | uppercase) ?? 'checkbox';

      <input
        id="{{ prefix }}-{{ idLabel }}-input"
        class="btn-check"
        type="checkbox"
        [formControl]="control"
        autocomplete="off"
        [checked]="control.value === true"
      />
      <label
        id="{{ prefix }}-{{ idLabel }}"
        for="{{ prefix }}-{{ idLabel }}-input"
        class="btn btn-custom px-2 d-flex align-items-center"
        [class]="{
          'btn-primary': control.value === true,
          active: control.value === true
        }"
        [ngbTooltip]="item.tooltip"
        [class]="
          control.value === true
            ? item.activeClass
              ? item.activeClass
              : 'text-primary'
            : ''
        "
      >
        <app-svg
          *ngIf="item.icon"
          [icon]="item.icon"
          size="{{ item.iconSize ?? 16 }}"
          [class]="{ 'me-2': !!item.label }"
        />{{ item.label }}
      </label>
    </ng-container>

    <!-- Multi toggle mode (radio buttons, uncheckable) -->
    <ng-container *ngIf="items.length > 1">
      <input
        id="{{ prefix }}-{{ item.value }}-input"
        class="btn-check"
        type="radio"
        [formControl]="control"
        [value]="item.value"
        autocomplete="off"
        [checked]="item.value === control.value"
      />
      <label
        id="{{ prefix }}-{{ item.value }}"
        for="{{ prefix }}-{{ item.value }}-input"
        class="btn btn-custom px-2 d-flex align-items-center"
        [class]="{
          'btn-primary': item.value === control.value,
          active: item.value === control.value
        }"
        [ngbTooltip]="item.tooltip"
        [class]="
          item.value === control.value
            ? item.activeClass
              ? item.activeClass
              : 'text-primary'
            : ''
        "
        (click)="itemClick(item, $event)"
      >
        <app-svg
          *ngIf="item.icon"
          [icon]="item.icon"
          size="{{ item.iconSize ?? 16 }}"
          [class]="{ 'me-2': !!item.label }"
        />{{ item.label }}
      </label>
    </ng-container>
  </ng-container>
</div>
